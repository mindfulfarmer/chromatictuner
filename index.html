<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Chromatic Tuner</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1e1e24">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tuner">
    <link rel="apple-touch-icon" href="./icon-192.png">

    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Remove blue tap highlight on mobile */
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #16161e, #2b2b36);
            overflow: hidden;
            color: #ffffff;
            /* Make it behave like a native app */
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        /* Glassmorphism Container */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            border-radius: 24px;
            padding: 40px 24px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            z-index: 1;
        }

        /* Starkly Embossed Title Logo */
        h1 { 
            font-size: 1.1rem; 
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px; 
            font-weight: 800;
            color: #1a1a20; 
            text-shadow: 
                -1px -1px 2px rgba(0,0,0,0.9),
                1px 1px 2px rgba(255,255,255,0.15);
        }

        /* --- 1. Western Carousel --- */
        .carousel-container {
            width: 100%;
            height: 140px; 
            position: relative;
            background: rgba(0, 0, 0, 0.15); 
            border-radius: 16px;
            margin: 0 0 30px 0;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
            box-shadow: inset 0 4px 15px rgba(0,0,0,0.2);
        }

        .carousel-highlight {
            position: absolute;
            top: 50%; left: 50%;
            width: 110px; height: 85%;
            background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.12));
            transform: translate(-50%, -50%);
            z-index: 1;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .carousel-track {
            display: flex;
            position: absolute;
            left: 50%;
            height: 100%;
            align-items: center;
            transition: transform 0.1s linear;
            z-index: 2; 
        }

        .carousel-note {
            width: 100px;
            text-align: center;
            font-size: 3.5rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.15);
            transition: color 0.2s, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: baseline;
        }

        .sharp-sym {
            font-size: 0.5em;
            vertical-align: super;
            margin-left: -2px;
            opacity: 0.9;
        }

        .carousel-note sub {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.3);
            margin-left: 4px;
        }

        /* Active Note States */
        .carousel-note.in-tune { color: #4ade80; transform: scale(1.3); text-shadow: 0 0 20px rgba(74, 222, 128, 0.4); }
        .carousel-note.in-tune sub { color: rgba(74, 222, 128, 0.8); }
        
        .carousel-note.flat { color: #60a5fa; transform: scale(1.3); text-shadow: 0 0 20px rgba(96, 165, 250, 0.4); }
        .carousel-note.flat sub { color: rgba(96, 165, 250, 0.8); }
        
        .carousel-note.sharp { color: #f87171; transform: scale(1.3); text-shadow: 0 0 20px rgba(248, 113, 113, 0.4); }
        .carousel-note.sharp sub { color: rgba(248, 113, 113, 0.8); }


        /* --- 2. Indian Notation Display --- */
        .note-display { 
            margin: 20px 0; 
            height: 80px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
        }
        
        #indian-note { 
            font-size: 2.5rem; 
            font-weight: 500; 
            height: 48px; 
            line-height: 48px;
            margin-bottom: 8px; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .roman-script {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.5);
            font-weight: 400;
        }

        #freq-display { 
            font-size: 1.1rem; 
            opacity: 0.5; 
            font-variant-numeric: tabular-nums; 
            height: 24px; 
            line-height: 24px;
            letter-spacing: 1px;
        }

        /* --- 3. Liquid Tube Accuracy Meter --- */
        .tuning-meter-container {
            width: 100%;
            margin: 20px 0 30px 0;
            padding: 10px 0;
        }

        .tuning-meter {
            width: 100%;
            height: 30px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.3));
            border-radius: 15px;
            position: relative;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.8), inset 0 -1px 2px rgba(255,255,255,0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tuning-center-notch {
            position: absolute;
            left: 50%;
            top: 0;
            width: 24px;
            height: 100%;
            border-left: 2px solid rgba(255, 255, 255, 0.2);
            border-right: 2px solid rgba(255, 255, 255, 0.2);
            transform: translateX(-50%);
            z-index: 3;
            pointer-events: none;
        }

        .tuning-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 44px;
            height: 22px;
            border-radius: 11px; 
            background: radial-gradient(ellipse at 30% 30%, rgba(255,255,255,0.7) 10%, rgba(200,200,200,0.2) 50%, rgba(0,0,0,0.3) 100%);
            box-shadow: inset 0 -2px 5px rgba(0,0,0,0.4), 0 2px 5px rgba(0,0,0,0.4);
            transform: translate(-50%, -50%);
            transition: left 0.1s linear, background 0.2s, box-shadow 0.2s;
            z-index: 2;
        }

        .tuning-indicator.in-tune { 
            background: radial-gradient(ellipse at 30% 30%, #a7f3d0 10%, #4ade80 50%, #065f46 100%);
            box-shadow: inset 0 -2px 5px rgba(0,0,0,0.3), 0 0 15px rgba(74, 222, 128, 0.7);
        }
        .tuning-indicator.flat { 
            background: radial-gradient(ellipse at 30% 30%, #bfdbfe 10%, #60a5fa 50%, #1e3a8a 100%);
            box-shadow: inset 0 -2px 5px rgba(0,0,0,0.3), 0 0 15px rgba(96, 165, 250, 0.7);
        }
        .tuning-indicator.sharp { 
            background: radial-gradient(ellipse at 30% 30%, #fecaca 10%, #f87171 50%, #7f1d1d 100%);
            box-shadow: inset 0 -2px 5px rgba(0,0,0,0.3), 0 0 15px rgba(248, 113, 113, 0.7);
        }

        /* --- 4. Controls --- */
        .glass-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px 32px;
            font-size: 1.1rem;
            color: #fff;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 240px;
            font-weight: 500;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .glass-btn:hover { background: rgba(255, 255, 255, 0.18); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.2);}
        .glass-btn:active { transform: translateY(0); }
    </style>
</head>
<body>

    <main class="glass-card">
        <h1>Chromatic Tuner</h1>
        
        <div class="carousel-container">
            <div id="carousel-highlight" class="carousel-highlight"></div>
            <div id="carousel-track" class="carousel-track">
            </div>
        </div>

        <div class="note-display">
            <div id="indian-note"></div>
            <div id="freq-display"></div>
        </div>

        <div class="tuning-meter-container">
            <div class="tuning-meter">
                <div class="tuning-center-notch"></div>
                <div id="tuning-indicator" class="tuning-indicator"></div>
            </div>
        </div>

        <button id="toggle-btn" class="glass-btn">Start Tuner</button>
    </main>

    <script>
        // Data Mapping
        const westernNotes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const indianNotes = [
            "सा <span class='roman-script'>(S)</span>", 
            "रे॒ <span class='roman-script'>(r)</span>", 
            "रे <span class='roman-script'>(R)</span>", 
            "ग॒ <span class='roman-script'>(g)</span>", 
            "ग <span class='roman-script'>(G)</span>", 
            "म <span class='roman-script'>(m)</span>", 
            "म॑ <span class='roman-script'>(M)</span>", 
            "प <span class='roman-script'>(P)</span>", 
            "ध॒ <span class='roman-script'>(d)</span>", 
            "ध <span class='roman-script'>(D)</span>", 
            "नि॒ <span class='roman-script'>(n)</span>", 
            "नि <span class='roman-script'>(N)</span>"
        ];

        // Carousel Setup
        const START_MIDI = 24; // C1
        const END_MIDI = 108;  // C8
        const NOTE_WIDTH = 100;
        const track = document.getElementById('carousel-track');
        const highlightRegion = document.getElementById('carousel-highlight');

        for (let i = START_MIDI; i <= END_MIDI; i++) {
            const el = document.createElement('div');
            el.className = 'carousel-note';
            el.id = 'note-' + i;
            
            let noteName = westernNotes[i % 12];
            if(noteName.includes('#')) {
                noteName = noteName.replace('#', '<span class="sharp-sym">#</span>');
            }

            const octaveNumber = Math.floor(i / 12) - 1; 
            el.innerHTML = `${noteName}<sub>${octaveNumber}</sub>`;
            track.appendChild(el);
        }

        function resetUI() {
            const defaultNote = 69; 
            const offset = (defaultNote - START_MIDI) * NOTE_WIDTH + (NOTE_WIDTH / 2);
            track.style.transform = `translateX(${-offset}px)`;
            
            document.querySelectorAll('.carousel-note').forEach(el => el.className = 'carousel-note');
            
            const indicator = document.getElementById('tuning-indicator');
            indicator.style.left = '50%';
            indicator.className = 'tuning-indicator';
            
            highlightRegion.style.borderColor = 'rgba(255, 255, 255, 0.15)';
            highlightRegion.style.boxShadow = '0 0 20px rgba(0,0,0,0.3)';

            document.getElementById('indian-note').innerHTML = '';
            document.getElementById('freq-display').textContent = '';
        }
        resetUI();

        // Audio Context Variables
        let audioContext = null;
        let analyser = null;
        let mediaStreamSource = null;
        let isTuning = false;
        let animationId = null;

        const toggleBtn = document.getElementById('toggle-btn');
        const indianNoteEl = document.getElementById('indian-note');
        const freqDisplayEl = document.getElementById('freq-display');
        const tuningIndicator = document.getElementById('tuning-indicator');

        function noteFromPitch(frequency) {
            const noteNum = 12 * (Math.log(frequency / 440) / Math.log(2));
            return Math.round(noteNum) + 69;
        }

        function frequencyFromNoteNumber(note) {
            return 440 * Math.pow(2, (note - 69) / 12);
        }

        function centsOffFromPitch(frequency, note) {
            return Math.floor(1200 * Math.log(frequency / frequencyFromNoteNumber(note)) / Math.log(2));
        }

        function autoCorrelate(buf, sampleRate) {
            let SIZE = buf.length;
            let rms = 0;

            for (let i = 0; i < SIZE; i++) {
                let val = buf[i];
                rms += val * val;
            }
            rms = Math.sqrt(rms / SIZE);
            if (rms < 0.01) return -1; 

            let r1 = 0, r2 = SIZE - 1, thres = 0.2;
            for (let i = 0; i < SIZE / 2; i++)
                if (Math.abs(buf[i]) < thres) { r1 = i; break; }
            for (let i = 1; i < SIZE / 2; i++)
                if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }

            buf = buf.slice(r1, r2);
            SIZE = buf.length;

            let c = new Array(SIZE).fill(0);
            for (let i = 0; i < SIZE; i++)
                for (let j = 0; j < SIZE - i; j++)
                    c[i] = c[i] + buf[j] * buf[j + i];

            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < SIZE; i++) {
                if (c[i] > maxval) {
                    maxval = c[i];
                    maxpos = i;
                }
            }
            let T0 = maxpos;

            let x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];
            let a = (x1 + x3 - 2 * x2) / 2;
            let b = (x3 - x1) / 2;
            if (a) T0 = T0 - b / (2 * a);

            return sampleRate / T0;
        }

        function updatePitch() {
            const bufferLength = analyser.fftSize;
            const buffer = new Float32Array(bufferLength);
            analyser.getFloatTimeDomainData(buffer);
            
            const ac = autoCorrelate(buffer, audioContext.sampleRate);

            if (ac !== -1) {
                const pitch = ac;
                let note = noteFromPitch(pitch);
                
                if (note < START_MIDI) note = START_MIDI;
                if (note > END_MIDI) note = END_MIDI;

                const noteIndex = note % 12;
                const cents = centsOffFromPitch(pitch, note);

                indianNoteEl.innerHTML = indianNotes[noteIndex];
                freqDisplayEl.textContent = `${pitch.toFixed(1)} Hz`;

                const N_continuous = (note - START_MIDI) + (cents / 100);
                const translateX = -(N_continuous * NOTE_WIDTH + (NOTE_WIDTH / 2));
                track.style.transform = `translateX(${translateX}px)`;

                let meterPercent = 50 + (cents * 0.8); 
                tuningIndicator.style.left = `${meterPercent}%`;

                document.querySelectorAll('.carousel-note').forEach(el => el.className = 'carousel-note');
                tuningIndicator.className = 'tuning-indicator'; 

                const activeEl = document.getElementById('note-' + note);
                
                if (activeEl) {
                    if (Math.abs(cents) <= 5) {
                        activeEl.classList.add('in-tune');
                        tuningIndicator.classList.add('in-tune');
                        highlightRegion.style.borderColor = 'rgba(74, 222, 128, 0.4)';
                        highlightRegion.style.boxShadow = '0 0 25px rgba(74, 222, 128, 0.15)';
                    } else if (cents < -5) {
                        activeEl.classList.add('flat');
                        tuningIndicator.classList.add('flat');
                        highlightRegion.style.borderColor = 'rgba(96, 165, 250, 0.3)';
                        highlightRegion.style.boxShadow = '0 0 20px rgba(96, 165, 250, 0.1)';
                    } else {
                        activeEl.classList.add('sharp');
                        tuningIndicator.classList.add('sharp');
                        highlightRegion.style.borderColor = 'rgba(248, 113, 113, 0.3)';
                        highlightRegion.style.boxShadow = '0 0 20px rgba(248, 113, 113, 0.1)';
                    }
                }
            }

            if (isTuning) {
                animationId = requestAnimationFrame(updatePitch);
            }
        }

        toggleBtn.addEventListener('click', async () => {
            if (isTuning) {
                isTuning = false;
                cancelAnimationFrame(animationId);
                if (mediaStreamSource) mediaStreamSource.disconnect();
                toggleBtn.textContent = 'Start Tuner';
                resetUI();
            } else {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 2048;
                    
                    mediaStreamSource = audioContext.createMediaStreamSource(stream);
                    mediaStreamSource.connect(analyser);
                    
                    isTuning = true;
                    toggleBtn.textContent = 'Stop Tuner';
                    
                    updatePitch();
                } catch (err) {
                    alert('Microphone access is required to tune your instrument.');
                    console.error('Mic error:', err);
                }
            }
        });

        // SW Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Registration skipped.'));
            });
        }
    </script>
</body>
</html>
